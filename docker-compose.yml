name: fireproof

# Local-dev workflow:
#   docker compose up -d                    # starts infra only (no profile)
#   pnpm dev                                # apps run natively
#   docker compose --profile app up -d      # also runs api/worker/web in containers

services:
  postgres:
    image: postgres:16-alpine
    container_name: fireproof-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fireproof
      POSTGRES_PASSWORD: fireproof
      POSTGRES_DB: fireproof
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fireproof -d fireproof"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: fireproof-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: fireproof-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  createbuckets:
    image: minio/mc:RELEASE.2024-10-08T09-37-26Z
    container_name: fireproof-createbuckets
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/scripts/minio-bootstrap.sh"]
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
      ORIGINALS_BUCKET: fireproof-originals
      DERIVATIVES_BUCKET: fireproof-derivatives
    volumes:
      - ./infrastructure/storage:/scripts:ro
    restart: "no"

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: fireproof-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: fireproof-api
    profiles: ["app"]
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "4000:4000"

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: fireproof-worker
    profiles: ["app"]
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: fireproof-web
    profiles: ["app"]
    env_file: .env
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  pgdata:
  miniodata:
