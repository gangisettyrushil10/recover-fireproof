name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: "9.12.0"
  NODE_VERSION: "20"

jobs:
  lint-typecheck:
    name: lint + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm typecheck

  test:
    name: test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["20"]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: fireproof
          POSTGRES_PASSWORD: fireproof
          POSTGRES_DB: fireproof
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fireproof -d fireproof"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      minio:
        image: minio/minio:RELEASE.2024-10-13T13-34-11Z
        env:
          MINIO_ROOT_USER: minio
          MINIO_ROOT_PASSWORD: minio12345
        ports:
          - 9000:9000
          - 9001:9001
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/live"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        # NOTE: GitHub-hosted service containers cannot override CMD, so MinIO
        # runs with its default entrypoint. Buckets are created in the step
        # below using `mc` against this instance.

    env:
      DATABASE_URL: postgres://fireproof:fireproof@localhost:5432/fireproof
      REDIS_URL: redis://localhost:6379
      S3_ENDPOINT: http://localhost:9000
      S3_REGION: us-east-1
      S3_BUCKET: fireproof-originals
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: minio12345
      JWT_SECRET: test-secret
      APP_URL: http://localhost:3000
      API_URL: http://localhost:4000
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: bootstrap minio buckets
        run: |
          curl -sSL https://dl.min.io/client/mc/release/linux-amd64/mc -o /usr/local/bin/mc
          chmod +x /usr/local/bin/mc
          MINIO_ENDPOINT=http://localhost:9000 \
          MINIO_ROOT_USER=minio \
          MINIO_ROOT_PASSWORD=minio12345 \
          ORIGINALS_BUCKET=fireproof-originals \
          DERIVATIVES_BUCKET=fireproof-derivatives \
          sh infrastructure/storage/minio-bootstrap.sh

      - name: build db package
        run: pnpm --filter @fireproof/db build

      - name: apply migrations
        run: |
          if pnpm --filter @fireproof/api run | grep -q "db:migrate"; then
            pnpm --filter @fireproof/api db:migrate
          else
            echo "Falling back to raw SQL migration application"
            sudo apt-get update && sudo apt-get install -y postgresql-client
            for f in packages/db/migrations/*.sql; do
              echo "Applying $f"
              psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f"
            done
          fi

      - name: seed
        run: pnpm --filter @fireproof/seed seed

      - name: test
        run: pnpm test

  build:
    name: build
    runs-on: ubuntu-latest
    needs: [lint-typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: cache turbo + next + dist
        uses: actions/cache@v4
        with:
          path: |
            .turbo
            **/.turbo
            apps/web/.next
            apps/api/dist
            apps/worker/dist
            packages/*/dist
          key: build-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            build-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            build-${{ runner.os }}-

      - run: pnpm install --frozen-lockfile

      - run: pnpm build
